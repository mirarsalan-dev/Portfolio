    <!-- Scroll Reveal JavaScript -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        entry.target.classList.remove('opacity-0', 'translate-y-12');
                        entry.target.classList.add('opacity-100', 'translate-y-0');
                    }
                });
            }, { threshold: 0.1 }); // Triggers when 10% of the element is visible

            const hiddenElements = document.querySelectorAll('.reveal');
            hiddenElements.forEach((el) => observer.observe(el));
        });

        // Custom Cursor Tracking
        const cursorGlow = document.getElementById('cursor-glow');
        document.addEventListener('mousemove', (e) => {
            // Smoothly track the mouse position
            cursorGlow.style.left = e.clientX + 'px';
            cursorGlow.style.top = e.clientY + 'px';
        });

        // Hide cursor glow when leaving the window
        document.addEventListener('mouseleave', () => cursorGlow.style.opacity = '0');
        document.addEventListener('mouseenter', () => cursorGlow.style.opacity = '1');
    </script>

<!-- Custom Starfield Animation Engine -->
    <script>
        const STAR_COLOR = '#fff';
        const STAR_SIZE = 3;
        const STAR_MIN_SCALE = 0.2;
        const OVERFLOW_THRESHOLD = 50;
        const STAR_COUNT = ( window.innerWidth + window.innerHeight ) / 8;

        // Modified to target the specific ID so it doesn't break Chart.js
        const canvas = document.getElementById( 'starfield' ),
              context = canvas.getContext( '2d' );

        let scale = 1, // device pixel ratio
            width,
            height;

        let stars = [];

        let pointerX,
            pointerY;

        let velocity = { x: 0, y: 0, tx: 0, ty: 0, z: 0.0005 };

        let touchInput = false;

        generate();
        resize();
        step();

        window.onresize = resize;
        // Modified to listen to the window instead of the canvas
        window.onmousemove = onMouseMove;
        window.ontouchmove = onTouchMove;
        window.ontouchend = onMouseLeave;
        document.onmouseleave = onMouseLeave;

        function generate() {
           for( let i = 0; i < STAR_COUNT; i++ ) {
            stars.push({
              x: 0,
              y: 0,
              z: STAR_MIN_SCALE + Math.random() * ( 1 - STAR_MIN_SCALE )
            });
           }
        }

        function placeStar( star ) {
          star.x = Math.random() * width;
          star.y = Math.random() * height;
        }

        function recycleStar( star ) {
          let direction = 'z';

          let vx = Math.abs( velocity.x ),
              vy = Math.abs( velocity.y );

          if( vx > 1 || vy > 1 ) {
            let axis;

            if( vx > vy ) {
              axis = Math.random() < vx / ( vx + vy ) ? 'h' : 'v';
            }
            else {
              axis = Math.random() < vy / ( vx + vy ) ? 'v' : 'h';
            }

            if( axis === 'h' ) {
              direction = velocity.x > 0 ? 'l' : 'r';
            }
            else {
              direction = velocity.y > 0 ? 't' : 'b';
            }
          }
          
          star.z = STAR_MIN_SCALE + Math.random() * ( 1 - STAR_MIN_SCALE );

          if( direction === 'z' ) {
            star.z = 0.1;
            star.x = Math.random() * width;
            star.y = Math.random() * height;
          }
          else if( direction === 'l' ) {
            star.x = -OVERFLOW_THRESHOLD;
            star.y = height * Math.random();
          }
          else if( direction === 'r' ) {
            star.x = width + OVERFLOW_THRESHOLD;
            star.y = height * Math.random();
          }
          else if( direction === 't' ) {
            star.x = width * Math.random();
            star.y = -OVERFLOW_THRESHOLD;
          }
          else if( direction === 'b' ) {
            star.x = width * Math.random();
            star.y = height + OVERFLOW_THRESHOLD;
          }
        }

        function resize() {
          scale = window.devicePixelRatio || 1;
          width = window.innerWidth * scale;
          height = window.innerHeight * scale;
          canvas.width = width;
          canvas.height = height;
          stars.forEach( placeStar );
        }

        function step() {
          context.clearRect( 0, 0, width, height );
          update();
          render();
          requestAnimationFrame( step );
        }

        function update() {
          velocity.tx *= 0.96;
          velocity.ty *= 0.96;

          velocity.x += ( velocity.tx - velocity.x ) * 0.8;
          velocity.y += ( velocity.ty - velocity.y ) * 0.8;

          stars.forEach( ( star ) => {
            star.x += velocity.x * star.z;
            star.y += velocity.y * star.z;

            star.x += ( star.x - width/2 ) * velocity.z * star.z;
            star.y += ( star.y - height/2 ) * velocity.z * star.z;
            star.z += velocity.z;
            
            // recycle when out of bounds
            if( star.x < -OVERFLOW_THRESHOLD || star.x > width + OVERFLOW_THRESHOLD || star.y < -OVERFLOW_THRESHOLD || star.y > height + OVERFLOW_THRESHOLD ) {
              recycleStar( star );
            }
          } );
        }

        function render() {
          stars.forEach( ( star ) => {
            context.beginPath();
            context.lineCap = 'round';
            context.lineWidth = STAR_SIZE * star.z * scale;
            context.globalAlpha = 0.5 + 0.5*Math.random();
            context.strokeStyle = STAR_COLOR;

            context.beginPath();
            context.moveTo( star.x, star.y );

            var tailX = velocity.x * 2,
                tailY = velocity.y * 2;

            // stroke() wont work on an invisible line
            if( Math.abs( tailX ) < 0.1 ) tailX = 0.5;
            if( Math.abs( tailY ) < 0.1 ) tailY = 0.5;

            context.lineTo( star.x + tailX, star.y + tailY );
            context.stroke();
          } );
        }

        function movePointer( x, y ) {
          if( typeof pointerX === 'number' && typeof pointerY === 'number' ) {
            let ox = x - pointerX,
                oy = y - pointerY;

            velocity.tx = velocity.tx + ( ox / 8*scale ) * ( touchInput ? 1 : -1 );
            velocity.ty = velocity.ty + ( oy / 8*scale ) * ( touchInput ? 1 : -1 );
          }
          pointerX = x;
          pointerY = y;
        }

        function onMouseMove( event ) {
          touchInput = false;
          movePointer( event.clientX, event.clientY );
        }

        function onTouchMove( event ) {
          touchInput = true;
          movePointer( event.touches[0].clientX, event.touches[0].clientY, true );
          event.preventDefault();
        }

        function onMouseLeave() {
          pointerX = null;
          pointerY = null;
        }
    </script>
</script>
<!-- UI Micro-Interactions Engine -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            // The Scroll Reveal Engine
            // This watches the screen and triggers your animations exactly when they scroll into view
            const observerOptions = {
                root: null,
                rootMargin: '0px',
                threshold: 0.15 // Triggers when 15% of the element is visible
            };

            const scrollObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        // Remove the hidden Tailwind classes
                        entry.target.classList.remove('opacity-0', 'translate-y-12');
                        // Add the visible Tailwind classes
                        entry.target.classList.add('opacity-100', 'translate-y-0');
                        
                        // Stop observing once it has revealed so it doesn't repeat infinitely
                        observer.unobserve(entry.target); 
                    }
                });
            }, observerOptions);

            // Find every element we tagged with 'reveal' and watch it
            document.querySelectorAll('.reveal').forEach((element) => {
                // Ensure smooth transitions are applied via Tailwind
                element.classList.add('transition-all', 'duration-1000', 'ease-out');
                scrollObserver.observe(element);
            });

        });
    </script>
    <script>
    // Mobile Menu Logic
    document.addEventListener("DOMContentLoaded", function() {
        const menuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');
        const mobileLinks = document.querySelectorAll('.mobile-link');
        let isMenuOpen = false;

        function toggleMenu() {
            isMenuOpen = !isMenuOpen;
            if (isMenuOpen) {
                // Slide in menu
                mobileMenu.classList.remove('translate-x-full');
                // Change to 'X' icon
                menuIcon.setAttribute('d', 'M6 18L18 6M6 6l12 12');
                // Prevent background scrolling
                document.body.style.overflow = 'hidden'; 
            } else {
                // Slide out menu
                mobileMenu.classList.add('translate-x-full');
                // Change back to hamburger icon
                menuIcon.setAttribute('d', 'M4 6h16M4 12h16M4 18h16');
                // Restore background scrolling
                document.body.style.overflow = ''; 
            }
        }

        menuBtn.addEventListener('click', toggleMenu);

        // Close menu when a link is clicked
        mobileLinks.forEach(link => {
            link.addEventListener('click', () => {
                if (isMenuOpen) toggleMenu();
            });
        });
    });
</script>
