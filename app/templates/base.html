<script>
document.addEventListener("DOMContentLoaded", () => {
    const preloader = document.getElementById('boot-preloader');
    const bootText = document.getElementById('boot-text');
    
    // The sequence of commands to simulate booting up
    const bootLines = [
        "[ OK ] Started Kernel Logging Service.",
        "[ OK ] Mounted /dev/core/arsalan_portfolio.",
        "[ OK ] Reached target System Initialization.",
        "Starting Flask Web Service...",
        "Loading Glassmorphism UI modules...",
        "Establishing encrypted socket connections...",
        "Compiling DOM protocols... DONE.",
        "Executing visual handover..."
    ];

    let lineIdx = 0;
    
    function typeBoot() {
        if (lineIdx < bootLines.length) {
            const p = document.createElement('p');
            p.innerHTML = bootLines[lineIdx];
            bootText.appendChild(p);
            lineIdx++;
            
            // Randomize typing speed for realism (between 50ms and 150ms)
            setTimeout(typeBoot, Math.random() * 100 + 50);
        } else {
            // Wait half a second after the last line, then fade out and remove
            setTimeout(() => {
                preloader.classList.add('opacity-0');
                // Wait for the CSS transition to finish before removing from DOM
                setTimeout(() => preloader.remove(), 1000);
            }, 400);
        }
    }
    
    // Start the boot sequence
    typeBoot();
});
</script>

                        entry.target.classList.add('opacity-100', 'translate-y-0');
                    }

        });

        // Hide cursor glow when leaving the window
        document.addEventListener('mouseleave', () => cursorGlow.style.opacity = '0');
        document.addEventListener('mouseenter', () => cursorGlow.style.opacity = '1');
    </script>

<!-- Custom Starfield Animation Engine -->
    <script>
        const STAR_COLOR = '#fff';
        const STAR_SIZE = 3;
        const STAR_MIN_SCALE = 0.2;
        const OVERFLOW_THRESHOLD = 50;
        const STAR_COUNT = ( window.innerWidth + window.innerHeight ) / 8;

        // Modified to target the specific ID so it doesn't break Chart.js
        const canvas = document.getElementById( 'starfield' ),
              context = canvas.getContext( '2d' );

        let scale = 1, // device pixel ratio
            width,
            height;

        let stars = [];

        let pointerX,
            pointerY;

        let velocity = { x: 0, y: 0, tx: 0, ty: 0, z: 0.0005 };

        let touchInput = false;

        generate();
        resize();
        step();

        window.onresize = resize;
        // Modified to listen to the window instead of the canvas
        window.onmousemove = onMouseMove;
        window.ontouchmove = onTouchMove;
        window.ontouchend = onMouseLeave;
        document.onmouseleave = onMouseLeave;

        function generate() {
           for( let i = 0; i < STAR_COUNT; i++ ) {
            stars.push({
              x: 0,
              y: 0,
              z: STAR_MIN_SCALE + Math.random() * ( 1 - STAR_MIN_SCALE )
            });
           }
        }

        function placeStar( star ) {
          star.x = Math.random() * width;
          star.y = Math.random() * height;
        }

        function recycleStar( star ) {
          let direction = 'z';

          let vx = Math.abs( velocity.x ),
              vy = Math.abs( velocity.y );

          if( vx > 1 || vy > 1 ) {
            let axis;

            if( vx > vy ) {
              axis = Math.random() < vx / ( vx + vy ) ? 'h' : 'v';
            }
            else {
              axis = Math.random() < vy / ( vx + vy ) ? 'v' : 'h';
            }

            if( axis === 'h' ) {
              direction = velocity.x > 0 ? 'l' : 'r';
            }
            else {
              direction = velocity.y > 0 ? 't' : 'b';
            }
          }
          
          star.z = STAR_MIN_SCALE + Math.random() * ( 1 - STAR_MIN_SCALE );

          if( direction === 'z' ) {
            star.z = 0.1;
            star.x = Math.random() * width;
            star.y = Math.random() * height;
          }
          else if( direction === 'l' ) {
            star.x = -OVERFLOW_THRESHOLD;
            star.y = height * Math.random();
          }
          else if( direction === 'r' ) {
            star.x = width + OVERFLOW_THRESHOLD;
            star.y = height * Math.random();
          }
          else if( direction === 't' ) {
            star.x = width * Math.random();
            star.y = -OVERFLOW_THRESHOLD;
          }
          else if( direction === 'b' ) {
            star.x = width * Math.random();
            star.y = height + OVERFLOW_THRESHOLD;
          }
        }

        function resize() {
          scale = window.devicePixelRatio || 1;
          width = window.innerWidth * scale;
          height = window.innerHeight * scale;
          canvas.width = width;
          canvas.height = height;
          stars.forEach( placeStar );
        }

        function step() {
          context.clearRect( 0, 0, width, height );
          update();
          render();
          requestAnimationFrame( step );
        }

        function update() {
          velocity.tx *= 0.96;
          velocity.ty *= 0.96;

          velocity.x += ( velocity.tx - velocity.x ) * 0.8;
          velocity.y += ( velocity.ty - velocity.y ) * 0.8;

          stars.forEach( ( star ) => {
            star.x += velocity.x * star.z;
            star.y += velocity.y * star.z;

            star.x += ( star.x - width/2 ) * velocity.z * star.z;
            star.y += ( star.y - height/2 ) * velocity.z * star.z;
            star.z += velocity.z;
            
            // recycle when out of bounds
            if( star.x < -OVERFLOW_THRESHOLD || star.x > width + OVERFLOW_THRESHOLD || star.y < -OVERFLOW_THRESHOLD || star.y > height + OVERFLOW_THRESHOLD ) {
              recycleStar( star );
            }
          } );
        }

        function render() {
          stars.forEach( ( star ) => {
            context.beginPath();
            context.lineCap = 'round';
            context.lineWidth = STAR_SIZE * star.z * scale;
            context.globalAlpha = 0.5 + 0.5*Math.random();
            context.strokeStyle = STAR_COLOR;

            context.beginPath();
            context.moveTo( star.x, star.y );

            var tailX = velocity.x * 2,
                tailY = velocity.y * 2;

            // stroke() wont work on an invisible line
            if( Math.abs( tailX ) < 0.1 ) tailX = 0.5;
            if( Math.abs( tailY ) < 0.1 ) tailY = 0.5;

            context.lineTo( star.x + tailX, star.y + tailY );
            context.stroke();
          } );
        }

        function movePointer( x, y ) {
          if( typeof pointerX === 'number' && typeof pointerY === 'number' ) {
            let ox = x - pointerX,
                oy = y - pointerY;

            velocity.tx = velocity.tx + ( ox / 8*scale ) * ( touchInput ? 1 : -1 );
            velocity.ty = velocity.ty + ( oy / 8*scale ) * ( touchInput ? 1 : -1 );
          }
          pointerX = x;
          pointerY = y;
        }

        function onMouseMove( event ) {
          touchInput = false;
          movePointer( event.clientX, event.clientY );
        }

        function onTouchMove( event ) {
          touchInput = true;
          movePointer( event.touches[0].clientX, event.touches[0].clientY, true );
          event.preventDefault();
        }

        function onMouseLeave() {
          pointerX = null;
          pointerY = null;
        }
    </script>
</script>
<!-- UI Micro-Interactions Engine -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            // The Scroll Reveal Engine
            // This watches the screen and triggers your animations exactly when they scroll into view
            const observerOptions = {
                root: null,
                rootMargin: '0px',
                threshold: 0.15 // Triggers when 15% of the element is visible
            };

            const scrollObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        // Remove the hidden Tailwind classes
                        entry.target.classList.remove('opacity-0', 'translate-y-12');
                        // Add the visible Tailwind classes
                        entry.target.classList.add('opacity-100', 'translate-y-0');
                        
                        // Stop observing once it has revealed so it doesn't repeat infinitely
                        observer.unobserve(entry.target); 
                    }
                });
            }, observerOptions);

            // Find every element we tagged with 'reveal' and watch it
            document.querySelectorAll('.reveal').forEach((element) => {
                // Ensure smooth transitions are applied via Tailwind
                element.classList.add('transition-all', 'duration-1000', 'ease-out');
                scrollObserver.observe(element);
            });

        });
    </script>

        const menuIcon = document.getElementById('menu-icon');
        const mobileLinks = document.querySelectorAll('.mobile-link');
        let isMenuOpen = false;

        function toggleMenu() {
            isMenuOpen = !isMenuOpen;
            if (isMenuOpen) {
                // Slide in menu
                mobileMenu.classList.remove('translate-x-full');
                // Change to 'X' icon
                menuIcon.setAttribute('d', 'M6 18L18 6M6 6l12 12');
                // Prevent background scrolling
                document.body.style.overflow = 'hidden'; 
            } else {
                // Slide out menu
                mobileMenu.classList.add('translate-x-full');
                // Change back to hamburger icon
                menuIcon.setAttribute('d', 'M4 6h16M4 12h16M4 18h16');
                // Restore background scrolling
                document.body.style.overflow = ''; 
            }
        }

        menuBtn.addEventListener('click', toggleMenu);

        // Close menu when a link is clicked
        mobileLinks.forEach(link => {
            link.addEventListener('click', () => {
                if (isMenuOpen) toggleMenu();
            });
        });
    });
</script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const dock = document.getElementById('mac-dock');
        const items = document.querySelectorAll('.dock-item');
        
        // Settings
        const maxScale = 1.5;     // How big the hovered item gets (150%)
        const maxDistance = 150;  // Pixel radius that affects neighboring items

        dock.addEventListener('mousemove', (e) => {
            items.forEach(item => {
                // Get the exact center X coordinate of the item
                const rect = item.getBoundingClientRect();
                const itemCenterX = rect.left + rect.width / 2;
                
                // Calculate distance from cursor to item center
                const distance = Math.abs(e.clientX - itemCenterX);
                
                // If cursor is near the item, calculate scale
                let scale = 1;
                if (distance < maxDistance) {
                    // Create a smooth decay curve (closer = bigger)
                    scale = 1 + (maxScale - 1) * Math.pow((1 - distance / maxDistance), 2);
                }

                // Apply the scale and adjust margins to push neighbors away cleanly
                item.style.transform = `scale(${scale})`;
                item.style.margin = `0 ${scale * 4}px`;
                item.style.transition = 'transform 50ms ease-out, margin 50ms ease-out';
            });
        });

        // When mouse leaves the dock entirely, snap everything back to normal
        dock.addEventListener('mouseleave', () => {
            items.forEach(item => {
                item.style.transform = `scale(1)`;
                item.style.margin = `0 0`;
                item.style.transition = 'transform 300ms ease-out, margin 300ms ease-out';
            });
        });
    });
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const overlay = document.getElementById('cmd-palette-overlay');
    const box = document.getElementById('cmd-palette-box');
    const input = document.getElementById('cmd-input');
    const resultsList = document.getElementById('cmd-results');
    
    let isPaletteOpen = false;
    let selectedIndex = 0;

    // Define your portfolio routes/anchors here
    const routes = [
        { name: "Home", path: "/#home", icon: "M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" },
        { name: "Download Resume", path: "{{ url_for('main.download_resume') }}", icon: "M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" },
        { name: "GitHub Repositories", path: "/#projects", icon: "M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" },
        { name: "Engineering Journey", path: "/#journey", icon: "M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" },
        { name: "Licenses & Certifications", path: "/#certifications", icon: "M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" },
        { name: "Contact Me", path: "/#contact", icon: "M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" }
    ];

    function togglePalette() {
        isPaletteOpen = !isPaletteOpen;
        if (isPaletteOpen) {
            overlay.classList.remove('opacity-0', 'pointer-events-none');
            box.classList.remove('scale-95');
            input.value = '';
            renderResults('');
            setTimeout(() => input.focus(), 100); // Focus input after animation
        } else {
            overlay.classList.add('opacity-0', 'pointer-events-none');
            box.classList.add('scale-95');
            input.blur();
        }
    }

    function renderResults(query) {
        resultsList.innerHTML = '';
        const filtered = routes.filter(route => route.name.toLowerCase().includes(query.toLowerCase()));
        selectedIndex = 0; // Reset selection

        if (filtered.length === 0) {
            resultsList.innerHTML = '<li class="px-6 py-4 text-slate-500 text-sm">No results found.</li>';
            return;
        }

        filtered.forEach((route, index) => {
            const li = document.createElement('li');
            const isSelected = index === selectedIndex;
            
            li.className = `px-4 py-3 flex items-center gap-3 cursor-pointer transition-colors border-l-2 ${isSelected ? 'border-indigo-500 bg-white/10 text-white' : 'border-transparent text-slate-400 hover:bg-white/5 hover:text-slate-200'}`;
            li.innerHTML = `
                <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${route.icon}"></path></svg>
                <span class="font-medium">${route.name}</span>
                <span class="ml-auto text-xs opacity-50 font-mono text-indigo-300">Jump</span>
            `;
            
            // Allow click to navigate
            li.addEventListener('click', () => {
                window.location.href = route.path;
                togglePalette();
            });
            resultsList.appendChild(li);
        });
    }

    // Keyboard Listeners
    document.addEventListener('keydown', (e) => {
        // Cmd+K (Mac) or Ctrl+K (Windows) to open
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
            e.preventDefault();
            togglePalette();
        }
        
        if (!isPaletteOpen) return;

        // Escape to close
        if (e.key === 'Escape') {
            togglePalette();
        }

        // Arrow navigation
        const items = resultsList.querySelectorAll('li');
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            selectedIndex = (selectedIndex + 1) % items.length;
            updateSelection(items);
        }
        if (e.key === 'ArrowUp') {
            e.preventDefault();
            selectedIndex = (selectedIndex - 1 + items.length) % items.length;
            updateSelection(items);
        }

        // Enter to select
        if (e.key === 'Enter' && items[selectedIndex]) {
            items[selectedIndex].click();
        }
    });

    // Update styling for arrow key selection
    function updateSelection(items) {
        items.forEach((item, index) => {
            if (index === selectedIndex) {
                item.className = 'px-4 py-3 flex items-center gap-3 cursor-pointer transition-colors border-l-2 border-indigo-500 bg-white/10 text-white';
            } else {
                item.className = 'px-4 py-3 flex items-center gap-3 cursor-pointer transition-colors border-l-2 border-transparent text-slate-400 hover:bg-white/5 hover:text-slate-200';
            }
        });
    }

    // Filter on type
    input.addEventListener('input', (e) => renderResults(e.target.value));

    // Close if clicked outside the box
    overlay.addEventListener('click', (e) => {
        if (e.target === overlay) togglePalette();
    });
});
</script>
